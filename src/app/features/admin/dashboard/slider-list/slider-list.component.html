<div class="admin-slider-page list">
  <div class="admin-header">
    <h3 class="text-titel">{{ 'slider.sliders' | translate }}</h3>
    <button class="btn btn-primary" [routerLink]="['/admin', 'dashboard', 'slider-manage']">
      {{ "add" | translate }}
    </button>
  </div>

  <div class="slider-preview">
    <swiper-container
      slides-per-view="1"
      effect="fade"
      speed="800"
      navigation="true"
      pagination="true"
      loop="true"
      autoplay='{"delay": 5000, "disableOnInteraction": false}'
      class="hero-swiper"
    >
      @for (slideItem of dataSource.data; track $index) {
      <swiper-slide class="hero-slide">
        <div class="slide-bg">
          <app-image [src]="slideItem.images[0].guidName" [flipImage]="flipImage"></app-image>
        </div>
        <div class="slide-overlay"></div>

        <div class="admin-actions">
          <a class="btn-icon-outline " [routerLink]="['/admin', 'dashboard', 'slider-manage', slideItem.id]" [attr.title]="'edit'">
            <mat-icon>edit</mat-icon>
          </a>
          <a class="btn-icon-outline " (click)="delete(slideItem.id!)" [attr.title]="'delete'">
            <mat-icon>delete</mat-icon>
          </a>
        </div>

        <div class="slide-content">
          <div class="slide-text-card">
            <span class="slide-badge">{{ 'slider.featured' | translate }}</span>
            <div class="slide-text">
              <div class="accent-line"></div>
              <h1 class="slide-title">{{ slideItem.title.local }}</h1>
              <p class="slide-desc">{{ slideItem.description.local }}</p>
            </div>
          </div>
          <div class="slide-social">
            @for (link of links; track link.url) {
            <a [href]="link.url" target="_blank" class="social-link" [attr.aria-label]="link.platform">
              <i [class]="link.icon"></i>
            </a>
            }
          </div>
        </div>
      </swiper-slide>
      }
    </swiper-container>
  </div>
</div>
