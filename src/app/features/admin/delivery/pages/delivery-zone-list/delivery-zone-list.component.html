<search-page
  [(pagedResult)]="dataEntity"
  [filter]="filter"
  (resetBase)="reset()"
  (searchBase)="search()"
  (pageChange)="onPageChange($event)"
>
  <page-header
    [title]="'delivery.delivery-zone-list' | translate"
    [label]="'product-collection.manage-collections' | translate"
    [icon]="'category'"
  >
    <header-actions>
      <div class="btn-container">
        <button
          type="button"
          class="btn btn-primary"
          [routerLink]="['delivery-time-slot-list']"
        >
          {{ "delivery.delivery-time-slot-list" | translate }}
        </button>
        <button
          class="btn-icon-ghost"
          (click)="toggleFilter()"
          tooltip="product-collection.filter"
        >
          <mat-icon>filter_list</mat-icon>
        </button>
        <button
          class="btn-icon-outline"
          (click)="manageZone(undefined)"
          icon="add"
          tooltip="product-collection.add-new-collection"
        >
          <mat-icon>add</mat-icon>
        </button>
      </div>
    </header-actions>
  </page-header>

  @if (filterVisible()) {
    <page-filter>
      <div class="filter-panel">
        <form>
          <div class="filter-row">
            <div class="filter-field">
              <label for="name" class="form-label-custom" translate>
                {{ "general.name" | translate }}
              </label>
              <div class="filter-input-wrapper">
                <span class="material-icons filter-input-icon">search</span>
                <input
                  type="name"
                  id="name"
                  [(ngModel)]="filter.name"
                  name="name"
                  class="form-control filter-input"
                  placeholder="{{
                    'product-collection.search-by-name-code-description'
                      | translate
                  }}"
                />
              </div>
            </div>
          </div>
        </form>
      </div>
    </page-filter>
  }

  <grid-result-body [allowExpand]="false">
    <grid-column label="general.name" field="name.local"></grid-column>
    <grid-column label="delivery.base-delivery-cost" field="baseDeliveryCost">
      <ng-template let-data>
        <span class="cell-text"
          >{{ data.baseDeliveryCost }} {{ "general.JOD" | translate }}</span
        >
      </ng-template>
    </grid-column>
    <grid-column label="product-collection.actions" field="actions">
      <ng-template let-data>
        <div class="action-cell">
          <div class="btn-container">
            <button
              class="btn-icon-ghost"
              (click)="toggleFilter()"
              [class.active]="filterVisible()"
              (click)="manageZone(data.id)"
              title="{{ 'general.edit' | translate }}"
            >
              <span class="material-symbols-outlined"> edit_document </span>
            </button>
          </div>
        </div>
      </ng-template>
    </grid-column>
  </grid-result-body>
</search-page>
