<div class="card search-card w-100 mx-auto">
    <div class="page-header">
        <ng-content select="page-header"></ng-content>
        <ng-content select="page-filter"></ng-content>
    </div>

    <div class="card-actions-bar d-flex align-items-center justify-content-end gap-2 px-4 py-3">
        <ui-button
            type="button"
            variant="outline"
            size="md"
            icon="refresh"
            (click)="reset()"
        >
            Reset
        </ui-button>

        <ui-button
            type="button"
            variant="primary"
            size="md"
            icon="search"
            (click)="search()"
        >
            Search
        </ui-button>
    </div>

    <div class="card-body p-4">
        <grid-result
            [data]="items()"
            [totalRecords]="totalRecords()"
            [loading]="isLoading()"
            (onLazyLoad)="loadData($event)"
            [(selection)]="selectedItems"
            [externalColumns]="gridConfig().column"
            [allowExpand]="gridConfig().allowExpand"
            [externalExpanded]="gridConfig().expandedTemplate"
        >
        </grid-result>
    </div>
</div>
