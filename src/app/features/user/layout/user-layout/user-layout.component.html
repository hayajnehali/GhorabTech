<mat-sidenav-container autosize>
  <mat-sidenav
    mode="over"
    position="start"
    [opened]="spinnerService.isSideBarOpen()"
  >
    <div class="d-flex justify-content-end m-3">
      <button mat-icon-button (click)="spinnerService.toggleSideBar()">
        <mat-icon>arrow_back</mat-icon>
      </button>
    </div>
    <app-navbar
      [categoryResult]="categoryResult"
      [productCategories]="productCategories"
      [cartCount]="cartCount"
      [cartTotal]="cartTotal"
    ></app-navbar>
  </mat-sidenav>
  <mat-sidenav mode="over" position="end" [opened]="spinnerService.isOpen()">
    <div class="d-flex justify-content-end m-3">
      <button mat-icon-button (click)="spinnerService.toggleSideCart()">
        <mat-icon>arrow_back</mat-icon>
      </button>
    </div>
    <app-card-sidenav
      (closeSideNav)="spinnerService.closeSideCart()"
    ></app-card-sidenav>
  </mat-sidenav>
  <mat-sidenav-content>
    <!-- Offcanvas Menu Begin -->
    <div class="offcanvas-menu-overlay"></div>
    <!-- Header Section Begin -->

    <header class="header">
      <!-- Top Bar -->
      <app-top-bar> </app-top-bar>
      <!-- Main Header -->
      <div class="container containerMenu">
        <div class="row align-items-center">
          <!-- Search + Lang -->
          <div
            class="col-2 col-md-4 mb-2 mb-md-0 d-flex flex-wrap justify-content-between"
          >
            @if (responsiveService.isMobile()) {
              <mat-icon
                class="menu-icon"
                (click)="spinnerService.toggleSideBar()"
                >menu</mat-icon
              >
            } @else {
              <app-search class="search-wrapper flex-grow-1 me-2">></app-search>
              <app-language-button
                class="lang mt-2 mt-sm-0 d-flex align-items-center"
              ></app-language-button>
            }
          </div>

          <!-- Logo -->
          <div
            class="col-8 col-md-4 text-center mb-md-0"
            [routerLink]="['/user']"
          >
            <img
              src="./assets/img/R.png"
              alt="Logo"
              style="height: 70px; width: auto"
              class="img-fluid"
            />
          </div>

          <!-- Cart -->
          <div
            class="col-2 col-md-4 text-md-start text-center mt-2 header-cart-zone"
          >
            <p class="mb-0 d-inline-flex align-items-center gap-3">
              @if (!responsiveService.isMobile()) {
                <app-login-logout-button></app-login-logout-button>
              }

              <a
                (click)="spinnerService.toggleSideCart()"
                class="text-dark position-relative cart-icon-btn d-flex align-items-center"
                aria-label="Shopping cart"
              >
                <i class="fa fa-shopping-cart fs-5"></i>

                <span
                  class="custom-cart-badge badge rounded-pill bg-danger shadow-sm"
                >
                  {{ cartCount }}
                </span>
              </a>

              @if (!responsiveService.isMobile()) {
                <span class="fw-semibold total-price-text">
                  {{ "general.JOD" | translate }} {{ cartTotal }}
                </span>
              }
            </p>
          </div>
        </div>

        <hr class="my-0 py-0" />
        @if (!responsiveService.isMobile()) {
          <app-navbar
            [categoryResult]="categoryResult"
            [productCategories]="productCategories"
            [cartCount]="cartCount"
            [cartTotal]="cartTotal"
          ></app-navbar>
        }
      </div>
    </header>
    <div class="mx-2 p-0 bo">
      <router-outlet></router-outlet>
    </div>
    <app-footer></app-footer>
  </mat-sidenav-content>
</mat-sidenav-container>
<a class="btn-whatsapp" (click)="openWhatsApp()" target="_blank">
  <i class="fab fa-whatsapp"></i>{{ "general.whatsAppNumber" | translate }}
</a>
