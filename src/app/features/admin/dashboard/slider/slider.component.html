<div class="admin-form-container">
  <div class="form-header">
    <div class="header-title">
      <h3>
        @if(isAdd){
          {{ "slider.add-slider" | translate }}
        }@else {
          {{ "slider.edit-slider" | translate }}
        }
      </h3>
      <p>{{ "slider.slider-image" | translate }}</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="save(sliderForm)" #sliderForm="ngForm">
      <div class="form-grid">

        <div class="form-group" [class.has-error]="titleEn.invalid && titleEn.touched">
          <label for="titleEn">
            {{ "general.titleEn" | translate }} <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <input
              type="text"
              id="titleEn"
              required
              name="titleEn"
              maxlength="40"
              [(ngModel)]="entity.title.english"
              #titleEn="ngModel"
              placeholder="e.g. Exclusive Collection"
            />
          </div>
          <app-form-error [control]="titleEn"></app-form-error>
        </div>

        <div class="form-group" [class.has-error]="titleAr.invalid && titleAr.touched">
          <label for="titleAr">
            {{ "general.titleAr" | translate }} <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <input
              type="text"
              id="titleAr"
              required
              name="titleAr"
              maxlength="40"
              [(ngModel)]="entity.title.arabic"
              #titleAr="ngModel"
              placeholder="مثال: تشكيلة حصرية"
            />
          </div>
        </div>

        <div class="form-group" [class.has-error]="descriptionEn.invalid && descriptionEn.touched">
          <label for="descriptionEn">
            {{ "general.descriptionEn" | translate }} <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <textarea
              id="descriptionEn"
              [rows]="3"
              name="descriptionEn"
              maxlength="100"
              [(ngModel)]="entity.description.english"
              #descriptionEn="ngModel"
              placeholder="e.g. Discover carefully selected gifts..."
            ></textarea>
          </div>
          <app-form-error [control]="descriptionEn"></app-form-error>
        </div>

        <div class="form-group" [class.has-error]="descriptionAr.invalid && descriptionAr.touched">
          <label for="descriptionAr">
            {{ "general.descriptionAr" | translate }} <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <textarea
              id="descriptionAr"
              [rows]="3"
              name="descriptionAr"
              maxlength="100"
              [(ngModel)]="entity.description.arabic"
              #descriptionAr="ngModel"
              placeholder="مثال: اكتشف هدايا مختارة بعناية..."
            ></textarea>
          </div>
          <app-form-error [control]="descriptionAr"></app-form-error>
        </div>

        <div class="form-group full-width">
          <label>
            {{ "general.image" | translate }} <span class="required">*</span>
          </label>
          <app-multi-image-upload
            name="images"
            required
            [aspectRatio]="16 / 9"
            #images="ngModel"
            [(ngModel)]="entity.images"
          ></app-multi-image-upload>
          <app-form-error [control]="images"></app-form-error>
          @if(entity.images.length > 1){
            <small class="text-danger">
              {{ "slider.slider-image" | translate }}
            </small>
          }
        </div>

      </div>

      <div class="btn-container">
        <button type="button" class="btn btn-secondary" (click)="goBack()">
          {{ "general.back" | translate }}
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="entity.images.length > 1">
          {{ "general.save" | translate }}
        </button>
      </div>
    </form>
  </div>
</div>
